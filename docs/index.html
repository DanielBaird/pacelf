<!DOCTYPE html>
<html>
    <head>
        <style>
            /* ----------------------------------------- */
            /* ----------------------------------------- */
            * { box-sizing: inherit; }
            :root {
                interpolate-size: allow-keywords;
                box-sizing: border-box;

                --primary-color: #c10015;
                --secondary-color: #273256;
                --accent-color: #E9F0F2;
                --dark-color: #00254a;
            }
            body {
                background: var(--dark-color);
                color: var(--accent-color);

                /* this font family will use the "system" font on any device */
                font-family: system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
                /* this font size calc make the font larger on wider screens */
                font-size: calc(13px + 0.4vw);
            }
            h1 { font-weight: 100; }
            p {
                margin: 0;
                padding: 0;
            }
            .main {
                max-width: 70em;
                margin: 0 auto;
                padding: 3em 1em;
                background-color: var(--primary-color);
            }
            .library {
                width: 100%;
                display: flex;
                direction: row;
                gap: 1em;
                align-items: stretch;
                align-content: stretch;
            }
            /* ----------------------------------------- */
            .message {
                text-align: center;
                font-size: 150%;
                color: #039;
            }
            .error { color: #a00; }
            /* ----------------------------------------- */
            .filters {
                width: 20em;
                flex-shrink: 0;
                flex-grow: 0;
                background-color: var(--secondary-color);
                color: var(--accent-color);
                padding: 0.5em;
            }
            .filtersHeader {
                padding: 1em 0;
            }
            .filter {
                padding: 0.5em;
                border: 1px solid var(--dark-color);
                border-width: 1px 0;
                transition: 0.33s;
            }
            .filter:hover {
                background-color: var(--dark-color);
            }
            .filterHead {
                display: flex;
                direction: row;
                align-items: center;
                align-content: stretch;
            }
            .filterLabel  { flex: 1 0; }

            .filter .filterToggle {
                color: inherit;
                opacity: 0.5;
                font-size: 110%;
                transform: rotate(180deg);
                transition: 0.33s;
                background-color: rgba(0,0,0, 0);
                height: 1.66em;
                width: 1.66em;
                border-radius: 50%;
                border: none;
            } 
            .filterToggle:hover {
                background-color: var(--secondary-color);
            }
            .filter .filterToggle:before { content: '▼'; }
            .filter.closed .filterToggle { transform: rotate(0); }

            .filterList { 
                padding: 0.5em 0 0.5em 1em;
                transition: 0.33s;
                overflow: hidden;
            }
            .filter.closed .filterList {
                padding: 0 0 0 1em;
                height: 0;
            }

            .filterItem {
                padding: 0.5em 0; 
                transition: 0.33s;
            }
            .filterItem:hover {
                background-color: var(--secondary-color);
            }
            /* ----------------------------------------- */
            .results {
                flex-grow: 1;
                background-color: var(--accent-color);
                color: var(--secondary-color);
                padding: 0 0.5em;
            }
            .result {
                margin: 0.5em 0;
                padding: 0.5em;
                border-radius: 0.5em;
                background-color: white;
            }
            /* ----------------------------------------- */
            /* ----------------------------------------- */
        </style>
    </head>
    <body>
        <div class="main">
            <h1>PacELF Digital Library</h1>
            <section class="library">
                <section class="filters">filters<br />filters<br />filters<br />filters<br /></section>
                <section class="results">
                    <div class="message status">Initialising...</div>
                    <p>If this page does not load please refresh.</p>
                </section>
            </section>
        </div>
        <script>
            // --------------------------------------------
            // --------------------------------------------
            let allItems = []
            let filteredItems = []
            // --------------------------------------------
            reportStatus('loading...')

            let itemLoader = fetch('library-index.json')
            itemLoader.then( (itemResponse) => {
                reportStatus('parsing data...')
                let itemParser = itemResponse.json()
                itemParser.then( (items) => {
                    reportStatus('preparing page...')
                    // here we have the items loaded from the JSON file
                    allItems = items
                    buildFilters()
                    buildResultList()
                    console.log(items[0])
                }).catch( err => {
                    reportError('could not load list of items.')
                })
            }).catch( err => {
                reportError('could not load list of items.')
            })
            // --------------------------------------------
            // Utility functions
            // --------------------------------------------
            // compact function for making a DOM element
            function makeNode(tag, className, ...content) {
                let node = document.createElement(tag)
                node.append(...content)
                node.className = className
                return node
            }
            // --------------------------------------------
            function reportStatus(msg) {
                let res = document.querySelector('section.results')
                res.innerHTML = ''
                res.appendChild( makeNode('div', 'message status', msg) )
            }
            // --------------------------------------------
            function reportError(err) {
                let res = document.querySelector('section.results')
                res.innerHTML = ''
                res.appendChild( makeNode('div', 'message error', err) )
            }
            // --------------------------------------------
            // construction of page elements
            // --------------------------------------------
            // go through the fields we want to filter
            // by, and make page elememnts for them
            function buildFilters() {

                const filtersElement = document.querySelector('section.filters')
                filtersElement.innerHTML = ''
                filtersElement.append( makeNode('div', 'filtersHeader', 'Filter by') )

                buildFilter('Year')
                buildFilter('Category')
            }
            // --------------------------------------------
            // make page elements for a single filter
            function buildFilter(field) {
                // get field's domain from all items list
                let domain = []
                allItems.forEach( item => {
                    let fieldValue = item[field]
                    if (!domain.includes(fieldValue)) {
                        domain.push(fieldValue)
                    }
                })
                domain.sort()

                let filterLabel = makeNode('b', 'filterLabel', field)
                let filterToggle = makeNode('button', 'filterToggle')
                filterToggle.addEventListener('click', (event) => {
                    // when the toggle is clicked, add or remove 
                    // the "closed" class on the parent filter
                    console.log(event)
                    event.target.parentElement.parentElement.classList.toggle('closed')
                }) 
                let filterHead = makeNode('div', 'filterHead', filterLabel, filterToggle)
                let filterList = makeNode('div', 'filterList', ...(domain.map( domItem => buildCheckboxItem(domItem))))

                let filterElement = makeNode('div', 'filter closed', filterHead, filterList)

                document.querySelector('section.filters').append(filterElement)
            }
            // --------------------------------------------
            // make a checkbox item for one possible
            // value for a given field's filter
            function buildCheckboxItem(value) {
                let cb = makeNode('input')
                cb.setAttribute('type', 'checkbox')

                let label = makeNode('label', '', cb, value)
                let item = makeNode('div', 'filterItem', label)
                return item
            }
            // --------------------------------------------
            // filter the list of all items by whatever is
            // selected in the filter list
            function applyFilters() {
                filteredItems = allItems
            }
            // --------------------------------------------
            // go through the filtered list of results and
            // make page elements for them all
            function buildResultList() {
                let resultElement = document.querySelector('section.results')
                resultElement.innerHTML = ""

                applyFilters()

                 if (filteredItems.length < 1) {
                    reportStatus('no items to display')
                 }

                filteredItems.forEach( item => {
                    resultElement.append(buildResult(item))
                })
            }
            // --------------------------------------------
            // make page elements for one single result 
            // item
            function buildResult(item) {
                let title = makeNode('p', 'title', item.Title)
                let result = makeNode('div', 'result', title)
                return result
            }
            // --------------------------------------------
            // --------------------------------------------
        </script>
    </body>
</html>
