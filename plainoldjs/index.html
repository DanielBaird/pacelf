<!DOCTYPE html>
<html>
    <head>
        <style>
            body {
                background: #00254a;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                font-size: calc(13px + 0.4vw);
            }
            .main {
                max-width: 60em;
                margin: 0 auto;
                padding: 3em 1em;
                background-color: white;
            }
            .library {
                width: 100%;
                display: flex;
                direction: row;
                gap: 1em;
                align-items: stretch;
                align-content: stretch;

            }
            .filters, .results {
                /* border: 1px solid pink; */
            }
            .filters {
                width: 20em;
                flex-shrink: 0;
                flex-grow: 0;
                background-color: #eee;
                padding: 0.5em;
            }
            .filter {
                margin: 0.1em 0;
                padding: 0.5em;
                background-color: white;
            }

            .results {
                flex-grow: 1;
            }
        </style>
    </head>
    <body>
        <div class="main">
            <h1>PacELF Rebuild</h1>
            <section class="library">
                <section class="filters">filters<br />filters<br />filters<br />filters<br /></section>
                <section class="results">results</section>
            </section>
        </div>
        <script>
            // --------------------------------------------
            // --------------------------------------------
            let allItems = []
            let filteredItems = []
            // --------------------------------------------
            let itemLoader = fetch('library-index.json')
            itemLoader.then( (itemResponse) => {
                let itemParser = itemResponse.json()
                itemParser.then( (items) => {
                    // here we have the items loaded from the JSON file
                    allItems = items
                    buildFilters()
                    buildResultList()
                    console.log(items[0])
                })
            })
            // --------------------------------------------
            function buildFilters() {
                document.querySelector('section.filters').innerHTML = "filters go here"

                buildFilter('Year')
                buildFilter('Category')
            }
            // --------------------------------------------
            function buildFilter(field) {
                // get field's domain from all items list
                let domain = []
                allItems.forEach( item => {
                    let fieldValue = item[field]
                    if (!domain.includes(fieldValue)) {
                        domain.push(fieldValue)
                    }
                })
                domain.sort()
                console.log(domain)

                let filterElement = document.createElement('div')
                filterElement.className = 'filter'
                filterElement.append(...[
                    'Field:',
                    field,
                    ...(domain.map( domItem => buildCheckboxItem(domItem)))
                ])

                document.querySelector('section.filters').append(filterElement)
            }
            // --------------------------------------------
            function buildCheckboxItem(value) {
                let item = document.createElement('div')
                let cb = document.createElement('input')
                cb.setAttribute('type', 'checkbox')
                item.append(cb)
                item.append(value)
                return item
            }
            // --------------------------------------------
            function applyFilters() {
                filteredItems = allItems
            }
            // --------------------------------------------
            function buildResultList() {
                let resultElement = document.querySelector('section.results')
                resultElement.innerHTML = ""

                applyFilters()

                filteredItems.forEach( item => {
                    resultElement.append("<p>" + item.Title + "</p>")
                })
            // --------------------------------------------
            }
            // --------------------------------------------
            // --------------------------------------------
        </script>
    </body>
</html>
